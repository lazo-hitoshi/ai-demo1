<style>

:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; z-index: 0; }

.header { margin-bottom: 36px; border-left: 4px solid var(--accent); padding-left: 20px; }
.header-label { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 8px; display: block; }
h1 { font-size: clamp(20px, 4vw, 28px); font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
.header-sub { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.phase-bar { display: flex; gap: 4px; margin-bottom: 28px; }
.phase-item { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background 0.4s; }
.phase-item.active { background: var(--accent); }
.phase-item.done { background: #22c55e; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
.panel-title { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 16px; text-transform: uppercase; }
.panel-title::before { content: ''; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.cat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: left; color: var(--text); font-family: 'Noto Sans JP', sans-serif; }
.cat-btn:hover, .cat-btn.selected { border-color: var(--accent); background: rgba(245,158,11,0.08); }

.cat-icon { font-size: 20px; margin-bottom: 6px; display: block; }
.cat-name { font-size: 13px; font-weight: 700; display: block; margin-bottom: 2px; }
.cat-desc { font-size: 11px; color: var(--text-muted); display: block; }
label { display: block; font-size: 11px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
textarea, input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 300; padding: 12px 14px; outline: none; resize: vertical; transition: border-color 0.2s; }
textarea:focus, input:focus { border-color: rgba(245,158,11,0.5); }
textarea { min-height: 100px; }
.btn-primary { width: 100%; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,158,11,0.3); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.hearing-panel { background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(245,158,11,0.02)); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.hearing-q { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 12px; line-height: 1.6; }
.hearing-q::before { content: 'Q. '; color: var(--accent); font-weight: 700; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; opacity: 0; transform: translateY(8px); transition: all 0.4s; }
.result-card.visible { opacity: 1; transform: translateY(0); }
.result-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.dept-badge { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; color: var(--accent); }
.status-tag { font-size: 10px; font-family: monospace; padding: 2px 8px; border-radius: 4px; background: rgba(245,158,11,0.1); color: var(--accent); border: 1px solid rgba(245,158,11,0.3); }
.result-body { padding: 16px; font-size: 13px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
.dots { display: inline-flex; align-items: center; gap: 4px; padding: 16px; color: var(--text-muted); font-size: 12px; }
.dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: db 1.2s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes db { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
.typing::after { content: 'в–Ҳ'; animation: blink 0.7s step-end infinite; color: var(--accent); font-size: 12px; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.final-box { background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(245,158,11,0.02)); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 24px; text-align: center; opacity: 0; transform: scale(0.97); transition: all 0.5s; }
.final-box.visible { opacity: 1; transform: scale(1); }
.final-box h2 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.final-box p { color: var(--text-dim); font-size: 13px; line-height: 1.7; }
.decision-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
.btn-go { padding: 12px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-go:hover { filter: brightness(1.1); }
.btn-hold { padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.btn-hold:hover { border-color: #ef4444; color: #ef4444; }
@media (max-width: 560px) { .cat-grid { grid-template-columns: 1fr; } .decision-btns { grid-template-columns: 1fr; } }
</style>

<script>
const API = 'https://ai-demo1-eta.vercel.app/api/chat';
const CAT_LABELS = {"power": "йӣ»еҠӣгғ»иҮӘе®¶зҷәйӣ»е•ҸйЎҢ", "facility": "иЁӯеӮҷгғ»еҶ·еҚҙгғ»е»әиЁӯе•ҸйЎҢ", "land": "з”Ёең°гғ»иЁұиӘҚеҸҜе•ҸйЎҢ", "feasibility": "дәӢжҘӯжҺЎз®—гғ»иЁҲз”»", "partner": "гғҷгғігғҖгғјгғ»гғ‘гғјгғҲгғҠгғје•ҸйЎҢ", "operation": "йҒӢз”Ёгғ»йҡңе®іеҜҫеҝң"};
const DEPTS = {"power": [{"key": "power", "icon": "вҡЎ", "label": "йӣ»еҠӣгғ»иЁӯеӮҷAI", "badge": "power", "msg": "йӣ»еҠӣгӮ·гӮ№гғҶгғ гӮ’еҲҶжһҗдёӯ..."}, {"key": "finance", "icon": "рҹ’ҙ", "label": "иІЎеӢҷгғ»жҺЎз®—AI", "badge": "finance", "msg": "йӣ»еҠӣгӮігӮ№гғҲгӮ’и©Ұз®—дёӯ..."}, {"key": "legal", "icon": "рҹ“Ӣ", "label": "жі•еӢҷгғ»иҰҸеҲ¶AI", "badge": "legal", "msg": "иҰҸеҲ¶гғ»иЁұиӘҚеҸҜгӮ’зўәиӘҚдёӯ..."}], "facility": [{"key": "tech", "icon": "рҹҸ—пёҸ", "label": "иЁӯеӮҷгғ»жҠҖиЎ“AI", "badge": "tech", "msg": "иЁӯеӮҷд»•ж§ҳгӮ’еҲҶжһҗдёӯ..."}, {"key": "quality", "icon": "рҹ”Қ", "label": "е“ҒиіӘз®ЎзҗҶAI", "badge": "quality", "msg": "е“ҒиіӘгғӘгӮ№гӮҜгӮ’зўәиӘҚдёӯ..."}, {"key": "finance", "icon": "рҹ’ҙ", "label": "иІЎеӢҷгғ»жҺЎз®—AI", "badge": "finance", "msg": "гӮігӮ№гғҲгӮ’и©Ұз®—дёӯ..."}], "land": [{"key": "legal", "icon": "рҹ“Ӣ", "label": "жі•еӢҷгғ»иҰҸеҲ¶AI", "badge": "legal", "msg": "жі•иҰҸгғ»иЁұиӘҚеҸҜгӮ’зўәиӘҚдёӯ..."}, {"key": "negotiation", "icon": "рҹӨқ", "label": "дәӨжёүж”ҜжҸҙAI", "badge": "negotiation", "msg": "ең°жЁ©иҖ…дәӨжёүж–№йҮқгӮ’жӨңиЁҺдёӯ..."}, {"key": "finance", "icon": "рҹ’ҙ", "label": "иІЎеӢҷгғ»жҺЎз®—AI", "badge": "finance", "msg": "з”Ёең°гӮігӮ№гғҲгӮ’и©Ұз®—дёӯ..."}], "feasibility": [{"key": "finance", "icon": "рҹ’ҙ", "label": "иІЎеӢҷгғ»жҺЎз®—AI", "badge": "finance", "msg": "TCOгғ»жҠ•иіҮеӣһеҸҺгӮ’и©Ұз®—дёӯ..."}, {"key": "risk", "icon": "рҹ“Ҡ", "label": "гғӘгӮ№гӮҜеҲҶжһҗAI", "badge": "risk", "msg": "дәӢжҘӯгғӘгӮ№гӮҜгӮ’еҲҶжһҗдёӯ..."}, {"key": "power", "icon": "вҡЎ", "label": "йӣ»еҠӣгғ»иЁӯеӮҷAI", "badge": "power", "msg": "йӣ»еҠӣгӮігӮ№гғҲеүҚжҸҗгӮ’зўәиӘҚдёӯ..."}], "partner": [{"key": "negotiation", "icon": "рҹӨқ", "label": "дәӨжёүж”ҜжҸҙAI", "badge": "negotiation", "msg": "гғҷгғігғҖгғјдәӨжёүж–№йҮқгӮ’жӨңиЁҺдёӯ..."}, {"key": "legal", "icon": "рҹ“Ӣ", "label": "жі•еӢҷгғ»еҘ‘зҙ„AI", "badge": "legal", "msg": "еҘ‘зҙ„гғ»дҝқиЁјжқЎд»¶гӮ’зўәиӘҚдёӯ..."}, {"key": "tech", "icon": "рҹҸ—пёҸ", "label": "иЁӯеӮҷгғ»жҠҖиЎ“AI", "badge": "tech", "msg": "жҠҖиЎ“д»•ж§ҳгӮ’зўәиӘҚдёӯ..."}], "operation": [{"key": "tech", "icon": "рҹ–ҘпёҸ", "label": "йҒӢз”Ёгғ»зӣЈиҰ–AI", "badge": "tech", "msg": "йҡңе®іеҺҹеӣ гӮ’еҲҶжһҗдёӯ..."}, {"key": "risk", "icon": "рҹ“Ҡ", "label": "гғӘгӮ№гӮҜеҲҶжһҗAI", "badge": "risk", "msg": "BCPгғ»еҶ—й•·жҖ§гӮ’зўәиӘҚдёӯ..."}, {"key": "finance", "icon": "рҹ’ҙ", "label": "иІЎеӢҷгғ»жҺЎз®—AI", "badge": "finance", "msg": "еҪұйҹҝгӮігӮ№гғҲгӮ’и©Ұз®—дёӯ..."}]};
let selectedCat = '', hearingAnswers = [], hearingQuestions = [], currentQ = 0;

function setPhase(n) {
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('ph'+i);
    if (i < n) el.className = 'phase-item done';
    else if (i === n) el.className = 'phase-item active';
    else el.className = 'phase-item';
  }
}

function selectCat(btn, key) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = key;
  document.getElementById('input-title').textContent = 'гҖҗ' + CAT_LABELS[key] + 'гҖ‘зҠ¶жіҒгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
  document.getElementById('step-input').style.display = 'block';
  document.getElementById('step-input').scrollIntoView({behavior:'smooth',block:'start'});
  setPhase(1);
}

async function startHearing() {
  const situation = document.getElementById('situation').value.trim();
  const scale = document.getElementById('scale').value.trim();
  if (!situation) { alert('зҠ¶жіҒгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  document.getElementById('hearing-btn').disabled = true;
  setPhase(2);
  const hearingArea = document.getElementById('step-hearing');
  hearingArea.style.display = 'block';
  hearingArea.innerHTML = '<div class="dots"><span></span><span></span><span></span><span style="margin-left:8px;font-size:12px;color:var(--text-muted)">зҠ¶жіҒгӮ’еҲҶжһҗгҒ—гҒҰиіӘе•ҸгӮ’жә–еӮҷдёӯ...</span></div>';
  const prompt = 'гӮ«гғҶгӮҙгғӘгҖҢ' + CAT_LABELS[selectedCat] + 'гҖҚгҒ®зӣёи«ҮгҖӮзҠ¶жіҒпјҡ' + situation + 'гҖӮиҰҸжЁЎпјҡ' + (scale||'дёҚжҳҺ') + 'гҖӮгҒ“гҒ®зҠ¶жіҒгӮ’ж·ұгҒҸзҗҶи§ЈгҒҷгӮӢгҒҹгӮҒгҒ®йҮҚиҰҒгҒӘиіӘе•ҸгӮ’2гҒӨдҪңжҲҗгҖӮд»ҘдёӢJSONгҒ®гҒҝеҮәеҠӣпјҡ{"q1":"иіӘе•Ҹ1","q2":"иіӘе•Ҹ2"}';
  try {
    const res = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:'жҘӯз•Ңе°Ӯй–ҖгӮігғігӮөгғ«гӮҝгғігғҲAIгҖӮJSONгҒ®гҒҝеҮәеҠӣгҖӮ',userMessage:prompt})});
    const data = await res.json();
    const clean = data.text.replace(/```json|```/g,'').trim();
    const qs = JSON.parse(clean);
    hearingQuestions = [qs.q1, qs.q2];
    hearingAnswers = ['',''];
    showHearingQ(0, situation, scale);
  } catch(e) {
    hearingArea.innerHTML = '<p style="color:#ef4444;padding:16px">гӮЁгғ©гғјпјҡ' + e.message + '</p>';
  }
}

function showHearingQ(idx, situation, scale) {
  const area = document.getElementById('step-hearing');
  area.innerHTML = '<div class="hearing-panel"><div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:0.08em">гғ’гӮўгғӘгғігӮ° ' + (idx+1) + ' / ' + hearingQuestions.length + '</div><div class="hearing-q">' + hearingQuestions[idx] + '</div><textarea id="hearing-ans" placeholder="гҒ§гҒҚгӮӢгҒ гҒ‘е…·дҪ“зҡ„гҒ«еӣһзӯ”гҒ—гҒҰгҒҸгҒ гҒ•гҒ„" style="min-height:80px"></textarea><button class="btn-primary" onclick="submitHearing(' + idx + ', \'' + situation.replace(/'/g,"\\'") + '\', \'' + scale.replace(/'/g,"\\'") + '\')">' + (idx < hearingQuestions.length-1 ? 'ж¬ЎгҒ®иіӘе•ҸгҒё в–¶' : 'еҲҶжһҗгӮ’й–Ӣе§ӢгҒҷгӮӢ в–¶') + '</button></div>';
}

function submitHearing(idx, situation, scale) {
  const ans = document.getElementById('hearing-ans').value.trim();
  if (!ans) { alert('еӣһзӯ”гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  hearingAnswers[idx] = ans;
  if (idx < hearingQuestions.length-1) { showHearingQ(idx+1, situation, scale); }
  else { document.getElementById('step-hearing').style.display='none'; runAnalysis(situation, scale); }
}

async function runAnalysis(situation, scale) {
  setPhase(3);
  const resultsArea = document.getElementById('step-results');
  resultsArea.innerHTML = '';
  const context = 'гӮ«гғҶгӮҙгғӘпјҡ' + CAT_LABELS[selectedCat] + '\nиҰҸжЁЎпјҡ' + (scale||'дёҚжҳҺ') + '\nзҠ¶жіҒпјҡ' + situation + '\nQ1: ' + hearingQuestions[0] + ' вҶ’ A: ' + hearingAnswers[0] + '\nQ2: ' + hearingQuestions[1] + ' вҶ’ A: ' + hearingAnswers[1];
  const targetDepts = DEPTS[selectedCat];
  let allResults = [];
  for (const dept of targetDepts) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'card-' + dept.key;
    card.innerHTML = '<div class="result-header"><div class="dept-badge">' + dept.icon + ' ' + dept.label + '</div><span class="status-tag">еҲҶжһҗдёӯ</span></div><div class="result-body" id="body-' + dept.key + '"><div class="dots"><span></span><span></span><span></span><span style="margin-left:8px;font-size:12px;color:var(--text-muted)">' + dept.msg + '</span></div></div>';
    resultsArea.appendChild(card);
    setTimeout(() => card.classList.add('visible'), 50);
    let result = '';
    try {
      const res = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:'гҒӮгҒӘгҒҹгҒҜ' + dept.label + 'гҒ§гҒҷгҖӮзӣёи«ҮеҶ…е®№гӮ’еҸ—гҒ‘еҸ–гӮҠжӢ…еҪ“еҲҶйҮҺгҒ§еҲҶжһҗгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ\n\nгҖҗеҮәеҠӣгҖ‘\nв–  зҠ¶жіҒиӘҚиӯҳ\nв–  гғӘгӮ№гӮҜгғ»е•ҸйЎҢзӮ№пјҲ2гҖң3зӮ№пјү\nв–  жҺЁеҘЁгӮўгӮҜгӮ·гғ§гғіпјҲ3зӮ№пјү\nв–  д»ЈиЎЁиҖ…гҒёгҒ®е ұе‘ҠдәӢй …\n\nз°ЎжҪ”гҒ«гҖӮ',userMessage:'зӣёи«ҮеҶ…е®№пјҡ\n' + context})});
      const data = await res.json();
      result = data.error ? '[гӮЁгғ©гғј] ' + data.error : data.text;
    } catch(e) { result = '[гӮЁгғ©гғј] ' + e.message; }
    allResults.push({dept: dept.label, result});
    const body = document.getElementById('body-' + dept.key);
    card.querySelector('.status-tag').textContent = 'е®ҢдәҶ';
    body.innerHTML = '';
    body.classList.add('typing');
    let i = 0;
    await new Promise(resolve => {
      function type() { if (i < result.length) { body.textContent += result[i++]; setTimeout(type, 6); } else { body.classList.remove('typing'); resolve(); } }
      type();
    });
    await sleep(400);
  }
  await showFinalSummary(context, allResults);
}

async function showFinalSummary(context, allResults) {
  setPhase(4);
  const resultsArea = document.getElementById('step-results');
  const summaryCard = document.createElement('div');
  summaryCard.className = 'result-card';
  summaryCard.innerHTML = '<div class="result-header"><div class="dept-badge">рҹ“Ҡ е ұйҖЈзӣёгӮөгғһгғӘгғј вҖ” д»ЈиЎЁиҖ…гҒё</div><span class="status-tag">дҪңжҲҗдёӯ</span></div><div class="result-body" id="body-summary"><div class="dots"><span></span><span></span><span></span><span style="margin-left:8px;font-size:12px;color:var(--text-muted)">еҗ„йғЁзҪІгҒ®е ұе‘ҠгӮ’зөұеҗҲдёӯ...</span></div></div>';
  resultsArea.appendChild(summaryCard);
  setTimeout(() => summaryCard.classList.add('visible'), 50);
  const deptSummary = allResults.map(r => 'гҖҗ' + r.dept + 'гҖ‘\n' + r.result).join('\n\n');
  let summary = '';
  try {
    const res = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:'еҸӮи¬ҖAIгҖӮеҗ„йғЁзҪІе ұе‘ҠгӮ’еҸ—гҒ‘гҖҒд»ЈиЎЁиҖ…гҒҢ30з§’гҒ§еҲӨж–ӯгҒ§гҒҚгӮӢе ұйҖЈзӣёгӮөгғһгғӘгғјгӮ’дҪңжҲҗгҖӮ\n\nгҖҗеҮәеҠӣгҖ‘\nв”Ғв”Ғв”Ғ д»ЈиЎЁиҖ…гҒёгҒ®е ұйҖЈзӣё в”Ғв”Ғв”Ғ\nв–  д»¶еҗҚпјҲдёҖиЎҢпјү\nв–  зҸҫзҠ¶пјҲ2иЎҢд»ҘеҶ…пјү\nв–  еҗ„йғЁзҪІгҒӢгӮүгҒ®иҰҒзӮ№\nв–  д»ЈиЎЁиҖ…гҒҢд»ҠгҒҷгҒҗжұәгӮҒгӮӢгҒ“гҒЁ\nв–  жҺЁеҘЁеҲӨж–ӯ\n\nз°ЎжҪ”гҒ«гҖӮ',userMessage:'зӣёи«Үжғ…е ұпјҡ\n' + context + '\n\nеҗ„йғЁзҪІе ұе‘Ҡпјҡ\n' + deptSummary})});
    const data = await res.json();
    summary = data.error ? '[гӮЁгғ©гғј] ' + data.error : data.text;
  } catch(e) { summary = '[гӮЁгғ©гғј] ' + e.message; }
  const summaryBody = document.getElementById('body-summary');
  summaryCard.querySelector('.status-tag').textContent = 'е®ҢдәҶ';
  summaryBody.innerHTML = '';
  summaryBody.classList.add('typing');
  let i = 0;
  await new Promise(resolve => {
    function type() { if (i < summary.length) { summaryBody.textContent += summary[i++]; setTimeout(type, 6); } else { summaryBody.classList.remove('typing'); resolve(); } }
    type();
  });
  await sleep(500);
  const finalBox = document.createElement('div');
  finalBox.className = 'final-box';
  finalBox.innerHTML = '<h2>вҡЎ д»ЈиЎЁиҖ…гҒ®жңҖзөӮеҲӨж–ӯ</h2><p>дёҠиЁҳгҒ®е ұйҖЈзӣёгӮ’зўәиӘҚгҒ—гҖҒеҜҫеҝңж–№йҮқгӮ’жұәе®ҡгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</p><div class="decision-btns"><button class="btn-go" onclick="decide(\'go\')">вң… гҒ“гҒ®ж–№йҮқгҒ§еҜҫеҝңгҒҷгӮӢ</button><button class="btn-hold" onclick="decide(\'reset\')">рҹ”„ зҠ¶жіҒгӮ’дҝ®жӯЈгҒ—гҒҰеҶҚзӣёи«Ү</button></div>';
  resultsArea.appendChild(finalBox);
  setTimeout(() => finalBox.classList.add('visible'), 100);
}

function decide(choice) {
  const resultsArea = document.getElementById('step-results');
  const done = document.createElement('div');
  done.className = 'final-box';
  if (choice === 'go') {
    done.innerHTML = '<div style="font-size:36px;margin-bottom:12px">вң…</div><h2>еҜҫеҝңж–№йҮқ зўәе®ҡ</h2><p>д»ЈиЎЁиҖ…гҒ®еҲӨж–ӯгҒҢе®ҢдәҶгҒ—гҒҫгҒ—гҒҹгҖӮ<br>еҗ„жӢ…еҪ“AIгҒ®жҺЁеҘЁгӮўгӮҜгӮ·гғ§гғігӮ’гӮӮгҒЁгҒ«еҜҫеҝңгӮ’йҖІгӮҒгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</p><a href="soudan_top.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--accent);color:var(--bg);border-radius:6px;font-weight:700;text-decoration:none;font-size:13px">вҶҗ жҘӯзЁ®йҒёжҠһгҒ«жҲ»гӮӢ</a>';
  } else {
    done.innerHTML = '<div style="font-size:36px;margin-bottom:12px">рҹ”„</div><h2>еҶҚзӣёи«Ү</h2><p>зҠ¶жіҒгӮ’дҝ®жӯЈгҒ—гҒҰеҶҚеәҰзӣёи«ҮгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</p><button class="btn-secondary" onclick="location.reload()" style="margin-top:16px">жңҖеҲқгҒӢгӮүгӮ„гӮҠзӣҙгҒҷ</button>';
  }
  resultsArea.appendChild(done);
  setTimeout(() => done.classList.add('visible'), 100);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
