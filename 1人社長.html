<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI案件ルーティング — 部署自動振り分けシステム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg: #f0f4f8; --surface: #ffffff; --surface2: #f5f8fc;
  --border: #dde3ed; --accent: #0ea57a; --accent2: #2563eb;
  --warn: #f59e0b; --danger: #ef4444; --purple: #7c3aed;
  --text: #1a2332; --text-muted: #8896a8; --text-dim: #5a6a7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }

/* Top bar */
.topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
.topbar-title { font-size: 15px; font-weight: 700; }
.topbar-sub { font-size: 11px; color: var(--text-muted); }
.topbar-nav { display: flex; gap: 4px; }
.nav-btn { padding: 6px 12px; border: none; background: transparent; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: rgba(14,165,122,0.1); color: var(--accent); font-weight: 700; }

.container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* Step indicator */
.step-indicator { display: flex; align-items: center; margin-bottom: 32px; overflow-x: auto; padding-bottom: 4px; }
.step-node { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
.step-node:not(:last-child) { flex: 1; }
.step-connector { flex: 1; height: 2px; background: var(--border); margin: 0 4px; margin-bottom: 22px; transition: background 0.5s; }
.step-connector.done { background: var(--accent); }
.step-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-muted); transition: all 0.4s; position: relative; z-index: 1; }
.step-dot.active { border-color: var(--accent); background: rgba(14,165,122,0.1); color: var(--accent); box-shadow: 0 0 0 4px rgba(14,165,122,0.1); animation: stepPulse 1.5s ease-in-out infinite; }
.step-dot.done { border-color: var(--accent); background: var(--accent); color: #fff; }
.step-dot.skip { border-color: var(--text-muted); background: var(--surface2); color: var(--text-muted); }
.step-dot.outsource { border-color: var(--warn); background: rgba(245,158,11,0.1); color: var(--warn); }
@keyframes stepPulse { 0%,100%{box-shadow:0 0 0 4px rgba(14,165,122,0.1)} 50%{box-shadow:0 0 0 8px rgba(14,165,122,0.05)} }
.step-label { font-size: 10px; color: var(--text-muted); text-align: center; white-space: nowrap; transition: color 0.3s; max-width: 60px; line-height: 1.3; }
.step-node.active .step-label { color: var(--accent); font-weight: 700; }
.step-node.done .step-label { color: var(--accent); }
.step-node.outsource .step-label { color: var(--warn); }

/* Cards */
.card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.card-icon.green { background: rgba(14,165,122,0.1); border: 1px solid rgba(14,165,122,0.25); }
.card-icon.blue { background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.25); }
.card-icon.amber { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); }
.card-icon.purple { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25); }
.card-title { font-size: 16px; font-weight: 700; }
.card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .span-2 { grid-column: span 2; }
label { display: block; font-size: 11px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 300; padding: 10px 14px; outline: none; resize: vertical; transition: border-color 0.2s; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,122,0.07); }
textarea { min-height: 90px; }

/* Buttons */
.btn { padding: 12px 24px; border-radius: 10px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: #0b8c68; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,122,0.3); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-warn { background: var(--warn); color: #fff; }
.btn-full { width: 100%; justify-content: center; margin-top: 16px; }

/* Routing map */
.route-map { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 20px; }
.route-dept { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 2px solid transparent; transition: all 0.3s; }
.route-dept.pending { background: var(--surface2); border-color: var(--border); color: var(--text-muted); }
.route-dept.active { background: rgba(14,165,122,0.1); border-color: var(--accent); color: var(--accent); animation: deptPulse 1.5s ease-in-out infinite; }
.route-dept.done { background: rgba(14,165,122,0.08); border-color: var(--accent); color: var(--accent); }
.route-dept.outsource { background: rgba(245,158,11,0.1); border-color: var(--warn); color: var(--warn); }
.route-dept.skip { opacity: 0.35; }
@keyframes deptPulse { 0%,100%{box-shadow:0 0 0 3px rgba(14,165,122,0.1)} 50%{box-shadow:0 0 0 6px rgba(14,165,122,0.05)} }
.route-arrow { color: var(--text-muted); font-size: 16px; }

/* Department processing card */
.dept-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; opacity: 0; transform: translateY(8px); transition: all 0.4s; }
.dept-card.visible { opacity: 1; transform: translateY(0); }
.dept-card.active-dept { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,122,0.08); }
.dept-card.outsource-dept { border-color: var(--warn); }
.dept-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.dept-header.outsource-header { background: rgba(245,158,11,0.06); }
.dept-name { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
.dept-badge { font-size: 10px; font-family: 'Space Mono', monospace; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em; }
.dept-badge.processing { background: rgba(14,165,122,0.1); color: var(--accent); border: 1px solid rgba(14,165,122,0.3); }
.dept-badge.done { background: rgba(14,165,122,0.12); color: var(--accent); border: 1px solid rgba(14,165,122,0.4); }
.dept-badge.editing { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
.dept-badge.outsource { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
.dept-body { padding: 16px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; color: var(--text); }
.dept-body.editable { background: var(--surface2); border-radius: 6px; outline: none; cursor: text; border: 1px solid rgba(14,165,122,0.3); }
.dept-body.editable:focus { border-color: var(--accent); }
.dept-toolbar { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--surface2); flex-wrap: wrap; }
.dept-action-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
.dept-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.dept-action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.dept-action-btn.warn { border-color: rgba(245,158,11,0.4); color: var(--warn); }

/* Handover card */
.handover-card { background: linear-gradient(135deg, #eef6ff, #f0fdf8); border: 1px solid #b8d8f8; border-radius: 8px; padding: 14px 16px; margin: 8px 16px 12px; font-size: 12px; line-height: 1.8; color: var(--text); }
.handover-title { font-size: 11px; font-weight: 700; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

/* Outsource panel */
.outsource-panel { background: linear-gradient(135deg, #fffbeb, #fff7ed); border: 1px solid #fcd34d; border-radius: 8px; padding: 16px; margin: 8px 16px 12px; }
.outsource-title { font-size: 12px; font-weight: 700; color: var(--warn); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.partner-select { width: 100%; padding: 8px 12px; border: 1px solid #fcd34d; border-radius: 6px; background: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; margin-bottom: 10px; outline: none; }

/* Final approval */
.approval-card { background: linear-gradient(135deg, #f0fdf8, #eef6ff); border: 2px solid var(--accent); border-radius: 12px; padding: 24px; text-align: center; }
.approval-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.approval-sub { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
.approval-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Processing dots */
.loading { display: flex; align-items: center; gap: 6px; padding: 16px; color: var(--text-muted); font-size: 13px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: db 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

/* Summary box */
.summary-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--text-muted); }
.summary-value { font-weight: 700; color: var(--text); }

/* Save bar */
.save-bar { background: linear-gradient(135deg, #edfdf6, #eef6ff); border: 1px solid rgba(14,165,122,0.3); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
.save-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.save-btn { padding: 8px 16px; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; }
.save-btn.primary { background: var(--accent); color: #fff; }
.save-btn.secondary { background: transparent; border: 1px solid rgba(14,165,122,0.4); color: var(--accent); }
.save-btn.blue { background: var(--accent2); color: #fff; }

/* Audit log */
.audit-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.audit-time { color: var(--text-muted); white-space: nowrap; min-width: 80px; font-family: 'Space Mono', monospace; }
.audit-dept { font-weight: 700; color: var(--accent); min-width: 80px; }
.audit-content { color: var(--text); flex: 1; }

@media(max-width:640px){.form-grid{grid-template-columns:1fr}.form-grid .span-2{grid-column:span 1}.approval-btns{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">AI</div>
    <div>
      <div class="topbar-title">AI案件ルーティング</div>
      <div class="topbar-sub">16部署自動振り分けシステム</div>
    </div>
  </div>
  <div class="topbar-nav">
    <button class="nav-btn" onclick="location.href='index.html'">📋 案件フロー</button>
    <button class="nav-btn" onclick="location.href='soudan_top.html'">🏠 業種相談</button>
    <button class="nav-btn" onclick="location.href='soudan.html'">💬 チャット</button>
    <button class="nav-btn active" onclick="showPanel('audit-panel')">📜 監査ログ</button>
  </div>
</div>

<div class="container">

  <!-- PHASE 1: 案件入力 -->
  <div id="panel-input">
    <div class="card">
      <div class="card-header">
        <div class="card-icon green">📋</div>
        <div>
          <div class="card-title">案件情報を入力</div>
          <div class="card-sub">入力内容をAIが解析し、必要な部署を自動判定します</div>
        </div>
      </div>
      <div class="form-grid">
        <div>
          <label>顧客企業名</label>
          <input type="text" id="r-company" placeholder="例：株式会社〇〇建設" />
        </div>
        <div>
          <label>業種</label>
          <select id="r-industry">
            <option value="">選択してください</option>
            <option>建設・土木</option><option>製造業</option><option>IT・ソフトウェア</option>
            <option>エネルギー・インフラ</option><option>不動産</option><option>医療・ヘルスケア</option>
            <option>小売・EC</option><option>物流・倉庫</option><option>金融・保険</option><option>その他</option>
          </select>
        </div>
        <div class="span-2">
          <label>案件内容・要件</label>
          <textarea id="r-content" placeholder="例：新しい在庫管理システムの開発を依頼したい。現在Excelで管理しているが、月次集計に2日かかっている。社員20名が使える。予算は500万円。開発期間は6ヶ月以内。セキュリティ要件あり。社内SEがいないため、保守も含めて対応してほしい。"></textarea>
        </div>
        <div>
          <label>予算感</label>
          <select id="r-budget">
            <option value="">未定</option>
            <option>〜100万円</option><option>100〜300万円</option><option>300〜500万円</option>
            <option>500万〜1000万円</option><option>1000万円以上</option>
          </select>
        </div>
        <div>
          <label>納期</label>
          <select id="r-deadline">
            <option value="">未定</option>
            <option>1ヶ月以内</option><option>3ヶ月以内</option><option>6ヶ月以内</option>
            <option>1年以内</option><option>1年以上</option>
          </select>
        </div>
        <div class="span-2">
          <label>特記事項（社外委託・特殊条件など）</label>
          <input type="text" id="r-notes" placeholder="例：秘密保持契約あり / 社内に開発人員なし / 海外拠点への展開予定" />
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="analyze-btn" onclick="analyzeCase()">
        🔍 AIが部署ルートを自動判定する
      </button>
    </div>
  </div>

  <!-- PHASE 2: ルーティング確認 -->
  <div id="panel-routing" style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">🗺️</div>
        <div>
          <div class="card-title">AIが判定した案件ルート</div>
          <div class="card-sub" id="routing-sub">案件を解析しています...</div>
        </div>
      </div>
      <div id="routing-loading" class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:8px">案件を解析して最適な部署ルートを判定中...</span></div>
      <div id="routing-result" style="display:none">
        <div class="route-map" id="route-map"></div>
        <div style="background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8;color:var(--text)" id="routing-reason"></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" onclick="startProcessing()">▶ このルートで処理を開始する</button>
          <button class="btn btn-secondary" onclick="resetAll()">← 入力に戻る</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PHASE 3: 部署処理 -->
  <div id="panel-processing" style="display:none">
    <div class="card" style="padding:16px 20px;margin-bottom:16px">
      <div id="step-indicator-area"></div>
    </div>
    <div id="dept-cards-area"></div>
  </div>

  <!-- PHASE 4: 社長承認 -->
  <div id="panel-approval" style="display:none">
    <div class="approval-card">
      <div style="font-size:48px;margin-bottom:12px">⚡</div>
      <div class="approval-title">全部署処理完了 — 社長の最終承認</div>
      <div class="approval-sub" id="approval-summary-text">全部署の処理が完了しました。内容を確認して最終判断を行ってください。</div>
      <div class="summary-box" id="approval-summary"></div>
      <div class="approval-btns">
        <button class="btn btn-primary" style="justify-content:center" onclick="finalApprove('go')">✅ 承認して次フェーズへ</button>
        <button class="btn btn-secondary" style="justify-content:center" onclick="finalApprove('back')">🔄 一部を修正して再検討</button>
      </div>
      <div class="save-bar" style="margin-top:16px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--accent)">📥 出力・保存</div>
          <div style="font-size:11px;color:var(--text-muted)">全工程の記録を保存できます</div>
        </div>
        <div class="save-btns">
          <button class="save-btn secondary" onclick="exportText()">📄 テキスト保存</button>
          <button class="save-btn primary" onclick="exportMinutes()">📋 議事録出力</button>
          <button class="save-btn blue" onclick="openLangExport()">🌏 多言語出力</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 監査ログパネル -->
  <div id="panel-audit" style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-icon purple">📜</div>
        <div><div class="card-title">監査ログ</div><div class="card-sub">全操作・AI判断の記録</div></div>
      </div>
      <div id="audit-log-area">
        <div style="text-align:center;padding:32px;color:var(--text-muted);font-size:14px">まだ記録がありません</div>
      </div>
      <button class="btn btn-secondary" style="margin-top:12px;font-size:12px" onclick="clearAuditLog()">🗑️ ログをクリア</button>
    </div>
  </div>

</div>

<script>
const API = 'https://ai-demo1-eta.vercel.app/api/chat';

// State
let caseData = {};
let routeList = [];
let currentDeptIdx = 0;
let deptResults = {};
let auditLog = JSON.parse(localStorage.getItem('audit_log') || '[]');

const DEPT_ICONS = {
  '経営企画':'📊','人事':'👥','総務':'🗂️','経理・財務':'💴',
  '法務・コンプライアンス':'⚖️','IT・AI統括':'💻','営業':'📞',
  'マーケティング':'📣','商品企画・事業企画':'💡','開発・技術':'🔧',
  '調達・購買':'📦','製造・オペレーション':'🏭','品質管理':'🔍',
  '物流・納品管理':'🚚','カスタマーサポート':'🎧','PMO・案件管理':'📋',
  '提携会社':'🤝'
};

function addAudit(dept, content) {
  const now = new Date();
  const time = now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  auditLog.unshift({ time, dept, content, date: now.toLocaleDateString('ja-JP') });
  if (auditLog.length > 100) auditLog = auditLog.slice(0, 100);
  localStorage.setItem('audit_log', JSON.stringify(auditLog));
  renderAuditLog();
}

function renderAuditLog() {
  const area = document.getElementById('audit-log-area');
  if (auditLog.length === 0) {

function clearAuditLog() {

async function analyzeCase() {
  const company = document.getElementById('r-company').value.trim();
  const industry = document.getElementById('r-industry').value;
  const content = document.getElementById('r-content').value.trim();
  const budget = document.getElementById('r-budget').value;
  const deadline = document.getElementById('r-deadline').value;
  const notes = document.getElementById('r-notes').value.trim();

  if (!company || !content) { alert('顧客企業名と案件内容を入力してください'); return; }

  caseData = { company, industry, content, budget, deadline, notes };
  document.getElementById('analyze-btn').disabled = true;

  document.getElementById('panel-routing').style.display = 'block';
  document.getElementById('routing-loading').style.display = 'flex';
  document.getElementById('routing-result').style.display = 'none';

  addAudit('システム', `案件受付：${company} / ${content.slice(0,40)}...`);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        systemPrompt: `あなたはAI案件ルーティングシステムです。案件内容を解析し、必要な部署を順番に判定してください。

利用可能な部署：営業、経営企画、商品企画・事業企画、法務・コンプライアンス、経理・財務、IT・AI統括、開発・技術、調達・購買、製造・オペレーション、品質管理、物流・納品管理、カスタマーサポート、PMO・案件管理、マーケティング

社外委託が必要な場合は「提携会社」を部署として追加してください。

以下のJSONのみ出力（説明不要）：
{"route":["部署1","部署2","部署3"],"reason":"このルートにした理由（200字以内）","outsource":true or false,"outsource_reason":"社外委託が必要な理由（ない場合は空文字）","priority":"high/medium/low","estimated_days":数字}`,
        userMessage: `案件情報：\n企業名：${company}\n業種：${industry||'不明'}\n内容：${content}\n予算：${budget||'未定'}\n納期：${deadline||'未定'}\n特記：${notes||'なし'}`
      })
    });
    const data = await res.json();
    const clean = data.text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);
    routeList = result.route;

    document.getElementById('routing-loading').style.display = 'none';
    document.getElementById('routing-result').style.display = 'block';
    document.getElementById('routing-sub').textContent = `${routeList.length}部署のルートを判定しました`;

    // Render route map
    const mapEl = document.getElementById('route-map');
    mapEl.innerHTML = routeList.map((dept, i) => `
      <div class="route-dept pending" id="map-${i}">${DEPT_ICONS[dept] || '🏢'} ${dept}</div>
      ${i < routeList.length-1 ? '<span class="route-arrow">→</span>' : ''}
    `).join('');

    document.getElementById('routing-reason').innerHTML = `
      <div style="font-weight:700;color:var(--accent2);margin-bottom:6px">📌 判定理由</div>
      ${result.reason}
      ${result.outsource ? `<div style="margin-top:10px;padding:8px 12px;background:rgba(245,158,11,0.08);border-radius:6px;color:var(--warn);font-size:12px">⚠️ 社外委託が必要：${result.outsource_reason}</div>` : ''}
      <div style="margin-top:10px;display:flex;gap:16px;font-size:12px;color:var(--text-muted)">
        <span>優先度：<strong style="color:${result.priority==='high'?'var(--danger)':result.priority==='medium'?'var(--warn)':'var(--accent)'}">${result.priority==='high'?'高':'medium'?'中':'低'}</strong></span>
        <span>目安工数：<strong>${result.estimated_days}日</strong></span>
      </div>`;

    addAudit('AI', `ルート判定：${routeList.join('→')}（${result.estimated_days}日）`);

  } catch(e) {
    document.getElementById('routing-loading').innerHTML = `<span style="color:var(--danger)">エラー：${e.message}</span>`;
  }
}

function startProcessing() {
  document.getElementById('panel-routing').style.display = 'none';
  document.getElementById('panel-processing').style.display = 'block';
  currentDeptIdx = 0;
  deptResults = {};
  renderStepIndicator();
  processNextDept();
}

function renderStepIndicator() {
  const area = document.getElementById('step-indicator-area');
  area.innerHTML = '<div style="display:flex;align-items:center;overflow-x:auto;padding-bottom:8px">' +
    routeList.map((dept, i) => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
        <div class="step-dot ${i<currentDeptIdx?'done':i===currentDeptIdx?'active':'pending'}" id="sdot-${i}" style="width:28px;height:28px;font-size:10px">
          ${i < currentDeptIdx ? '✓' : DEPT_ICONS[dept]?.slice(0,2) || (i+1)}
        </div>
        <div style="font-size:9px;color:var(--text-muted);text-align:center;max-width:52px;line-height:1.2">${dept.replace('・','\n')}</div>
      </div>
      ${i < routeList.length-1 ? '<div style="height:2px;flex:1;background:'+(i<currentDeptIdx?'var(--accent)':'var(--border)')+';min-width:12px;margin-bottom:20px;transition:background 0.5s"></div>' : ''}
    `).join('') + '</div>';
}

async function processNextDept() {
  if (currentDeptIdx >= routeList.length) {
    await showApproval();
    return;
  }

  const dept = routeList[currentDeptIdx];
  renderStepIndicator();

  // Update route map
  document.querySelectorAll('.route-dept').forEach((el, i) => {
    el.className = 'route-dept ' + (i < currentDeptIdx ? 'done' : i === currentDeptIdx ? 'active' : 'pending');
  });

  // Add dept card
  const cardsArea = document.getElementById('dept-cards-area');
  const card = document.createElement('div');
  card.className = 'dept-card active-dept';
  card.id = `dc-${currentDeptIdx}`;
  card.innerHTML = `
    <div class="dept-header">
      <div class="dept-name">${DEPT_ICONS[dept]||'🏢'} ${dept}</div>
      <span class="dept-badge processing" id="db-${currentDeptIdx}">処理中</span>
    </div>
    <div class="dept-body" id="dd-${currentDeptIdx}">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span style="margin-left:8px">${dept}が分析中...</span>
      </div>
    </div>`;
  cardsArea.appendChild(card);
  setTimeout(() => card.classList.add('visible'), 50);
  card.scrollIntoView({behavior:'smooth', block:'nearest'});

  addAudit(dept, '処理開始');

  // Build previous results context
  const prevContext = Object.entries(deptResults)
    .map(([d, r]) => `【${d}の結果】\n${r}`)
    .join('\n\n');

  const systemPrompt = getDeptSystemPrompt(dept);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        systemPrompt,
        userMessage: `案件情報：\n企業名：${caseData.company}\n業種：${caseData.industry||'不明'}\n内容：${caseData.content}\n予算：${caseData.budget||'未定'}\n納期：${caseData.deadline||'未定'}\n特記：${caseData.notes||'なし'}\n\n${prevContext ? '前部署の処理結果：\n' + prevContext : ''}`
      })
    });
    const data = await res.json();
    const result = data.error ? `[エラー] ${data.error}` : data.text;
    deptResults[dept] = result;

    // Type result
    const body = document.getElementById(`dd-${currentDeptIdx}`);
    body.innerHTML = '';
    let i = 0;
    await new Promise(resolve => {
      function type() {
        if (i < result.length) { body.textContent += result[i++]; setTimeout(type, 5); }
        else resolve();
      }
      type();
    });

    document.getElementById(`db-${currentDeptIdx}`).textContent = '完了';
    document.getElementById(`db-${currentDeptIdx}`).className = 'dept-badge done';
    card.classList.remove('active-dept');

    addAudit(dept, `処理完了：${result.slice(0,60)}...`);

    // Add toolbar
    addDeptToolbar(card, currentDeptIdx, dept, result);

    // Add handover card if not last
    if (currentDeptIdx < routeList.length - 1) {
      await addHandover(dept, routeList[currentDeptIdx + 1], result, cardsArea);
    }

    currentDeptIdx++;
    await sleep(800);
    await processNextDept();

  } catch(e) {
    document.getElementById(`dd-${currentDeptIdx}`).textContent = `[エラー] ${e.message}`;
    document.getElementById(`db-${currentDeptIdx}`).textContent = 'エラー';
  }
}

function getDeptSystemPrompt(dept) {
  const base = `あなたは${dept}のAIです。案件情報と前部署の結果を受け取り、あなたの担当業務の観点で分析・処理してください。\n\n`;
  const prompts = {
    '営業': base + '【出力】\n■ 顧客要望の整理\n■ 提案の切り口（2案）\n■ 確認すべき事項\n■ 次部署への引き継ぎポイント',
    '法務・コンプライアンス': base + '【出力】\n■ 契約リスクの確認\n■ 注意すべき条項\n■ 必要な対応\n■ 次部署への制約・条件',
    '経理・財務': base + '【出力】\n■ 採算シミュレーション（楽観・中立・保守）\n■ 注意コスト項目\n■ 回収時期の目安\n■ GO/NO-GO判断軸',
    '開発・技術': base + '【出力】\n■ 技術的実現可能性\n■ 開発アプローチ\n■ リスクと課題\n■ 工数・納期見通し',
    '品質管理': base + '【出力】\n■ 品質基準の確認\n■ チェックリスト（主要項目）\n■ リスクと対策\n■ 承認条件',
    '調達・購買': base + '【出力】\n■ 必要資材・外部サービスの整理\n■ 調達方針\n■ コスト見積\n■ 提携会社への依頼内容',
    '提携会社': base + '【出力】\n■ 依頼内容の整理\n■ 必要作業の詳細\n■ 納期・品質基準\n■ 外部向け依頼書の草案',
    'PMO・案件管理': base + '【出力】\n■ 全体進捗の整理\n■ リスク・課題一覧\n■ 次フェーズの計画\n■ 社長への報告事項',
  };
  return prompts[dept] || base + '【出力】\n■ 担当業務の確認事項\n■ リスク・問題点\n■ 推奨アクション\n■ 次部署への引き継ぎ事項';
}

async function addHandover(fromDept, toDept, result, container) {
  const handover = document.createElement('div');
  handover.className = 'handover-card';
  handover.style.cssText = 'margin:0 0 14px';
  handover.innerHTML = `
    <div class="handover-title">🔄 ${fromDept} → ${toDept} への引き継ぎ内容</div>
    <div class="loading" id="hw-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:8px;font-size:12px">引き継ぎ情報を整理中...</span></div>
    <div id="hw-content" style="font-size:12px;line-height:1.8;display:none"></div>`;
  container.appendChild(handover);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        systemPrompt: `あなたは案件引き継ぎAIです。${fromDept}の処理結果を受け取り、${toDept}が必要とする情報に整理して渡してください。\n\n箇条書きで簡潔に。${toDept}が最初に読む前提で書いてください。`,
        userMessage: `${fromDept}の処理結果：\n${result}`
      })
    });
    const data = await res.json();
    document.getElementById('hw-loading').style.display = 'none';
    document.getElementById('hw-content').style.display = 'block';
    document.getElementById('hw-content').textContent = data.text || '[エラー]';
    addAudit('システム', `引き継ぎ：${fromDept}→${toDept}`);
  } catch(e) {
    document.getElementById('hw-loading').style.display = 'none';
    document.getElementById('hw-content').style.display = 'block';
    document.getElementById('hw-content').textContent = result.slice(0, 200) + '...';
  }
}

function addDeptToolbar(card, idx, dept, result) {
  const toolbar = document.createElement('div');
  toolbar.className = 'dept-toolbar';
  toolbar.innerHTML = `
    <button class="dept-action-btn" onclick="editDept(${idx})">✏️ 修正する</button>
    <button class="dept-action-btn" onclick="explainDept(${idx}, '${dept}')">💡 わかりやすく</button>
    <button class="dept-action-btn" onclick="quizDept(${idx}, '${dept}')">🧠 理解度チェック</button>`;
  card.appendChild(toolbar);
}

function editDept(idx) {
  const body = document.getElementById(`dd-${idx}`);
  const isEditing = body.contentEditable === 'true';
  if (!isEditing) {
    body.contentEditable = 'true';
    body.classList.add('editable');
    body.focus();
    document.getElementById(`db-${idx}`).textContent = '編集中';
    document.getElementById(`db-${idx}`).className = 'dept-badge editing';
    const toolbar = document.querySelector(`#dc-${idx} .dept-toolbar`);
    toolbar.innerHTML = `
      <button class="dept-action-btn primary" onclick="saveEditDept(${idx})">✅ 保存</button>
      <button class="dept-action-btn" onclick="cancelEditDept(${idx})">✕ キャンセル</button>`;
  }
}

function saveEditDept(idx) {
  const body = document.getElementById(`dd-${idx}`);
  body.contentEditable = 'false';
  body.classList.remove('editable');
  const dept = routeList[idx];
  deptResults[dept] = body.textContent;
  document.getElementById(`db-${idx}`).textContent = '編集済';
  document.getElementById(`db-${idx}`).className = 'dept-badge done';
  addDeptToolbar(document.getElementById(`dc-${idx}`), idx, dept, body.textContent);
  addAudit(dept, '内容を手動修正');
}

function cancelEditDept(idx) {
  const body = document.getElementById(`dd-${idx}`);
  const dept = routeList[idx];
  body.contentEditable = 'false';
  body.classList.remove('editable');
  body.textContent = deptResults[dept] || '';
  document.getElementById(`db-${idx}`).textContent = '完了';
  document.getElementById(`db-${idx}`).className = 'dept-badge done';
  addDeptToolbar(document.getElementById(`dc-${idx}`), idx, dept, deptResults[dept]);
}

async function explainDept(idx, dept) {

  explainEl.innerHTML = '<div style="padding:10px 14px;background:#ddeeff;border-bottom:1px solid #b8d8f8;font-size:12px;font-weight:700;color:#1a7abf">💡 わかりやすい説明</div><div style="padding:14px;font-size:13px;line-height:1.8" id="exp-body-'+idx+'"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  const toolbar = card.querySelector('.dept-toolbar');
  card.insertBefore(explainEl, toolbar);

async function quizDept(idx, dept) {
  const body = document.getElementById(`dd-${idx}`);
  const text = deptResults[dept] || body.textContent;
  const card = document.getElementById(`dc-${idx}`);
  let quizEl = card.querySelector('.quiz-panel');
  if (quizEl) { quizEl.remove(); return; }
  quizEl = document.createElement('div');
  quizEl.className = 'quiz-panel';
  quizEl.style.cssText = 'margin:0 16px 12px;background:linear-gradient(135deg,#f5eeff,#faf5ff);border:1px solid #d4b8f8;border-radius:8px;overflow:hidden';
  quizEl.innerHTML = '<div style="padding:10px 14px;background:#ede0ff;border-bottom:1px solid #d4b8f8;font-size:12px;font-weight:700;color:#7c3aed">🧠 理解度チェック</div><div style="padding:14px" id="quiz-body-'+idx+'"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:8px;font-size:12px;color:#8896a8">問題作成中...</span></div></div>';
  const toolbar = card.querySelector('.dept-toolbar');
  card.insertBefore(quizEl, toolbar);
  try {
    const res = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:'以下のJSONのみ出力（説明不要）：{"q1":{"question":"問題","options":["A.選択肢1","B.選択肢2","C.選択肢3"],"answer":"A","reason":"解説"},"q2":{"question":"問題","options":["A.選択肢1","B.選択肢2","C.選択肢3"],"answer":"B","reason":"解説"},"q3":{"question":"問題","options":["A.選択肢1","B.選択肢2","C.選択肢3"],"answer":"C","reason":"解説"}}',userMessage:'以下の内容で理解度チェッククイズを3問：\n\n'+text})});
    const data = await res.json();
    const clean = data.text.replace(/```json|```/g,'').trim();
    const quiz = JSON.parse(clean);
    renderQuiz(idx, quiz);
  } catch(e) { document.getElementById('quiz-body-'+idx).innerHTML = '<p style="color:#ef4444;padding:4px">クイズ生成に失敗しました</p>'; }
}

function renderQuiz(idx, quiz) {
  const qs = [quiz.q1, quiz.q2, quiz.q3];
  let score = 0; let answered = 0;
  document.getElementById('quiz-body-'+idx).innerHTML = qs.map((q, qi) => `
    <div style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a2332">Q${qi+1}. ${q.question}</div>
      <div>${q.options.map(opt => `<button onclick="answerQuizRouting(this,'${opt.charAt(0)}','${q.answer}','${q.reason.replace(/'/g,"\\'")}',${idx},${qi})" style="display:block;width:100%;text-align:left;padding:7px 12px;margin-bottom:4px;border:1px solid #dde3ed;border-radius:6px;background:#fff;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;transition:all 0.2s">${opt}</button>`).join('')}</div>
      <div id="qfb-${idx}-${qi}" style="display:none;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.6;margin-top:4px"></div>
    </div>`).join('') +
    `<div id="qresult-${idx}" style="display:none;text-align:center;padding:12px;font-weight:700;color:#7c3aed;font-size:14px"></div>`;
  window[`_quiz_${idx}`] = { total: 3, answered: 0, score: 0 };
}

function answerQuizRouting(btn, answer, correct, reason, idx, qi) {
  const container = btn.parentElement;
  container.querySelectorAll('button').forEach(b => {
    b.disabled = true;
    if (b.textContent.startsWith(correct)) { b.style.background='#edfdf6'; b.style.borderColor='#0ea57a'; b.style.color='#0ea57a'; b.style.fontWeight='700'; }
    else if (b === btn && answer !== correct) { b.style.background='#fff0f0'; b.style.borderColor='#ef4444'; b.style.color='#ef4444'; }
  });
  const fb = document.getElementById(`qfb-${idx}-${qi}`);
  fb.style.display = 'block';
  fb.style.background = answer === correct ? '#edfdf6' : '#fff0f0';
  fb.style.border = `1px solid ${answer === correct ? '#a7e8d2' : '#f8b4cc'}`;
  fb.textContent = (answer === correct ? '✅ 正解！ ' : '❌ 不正解 ') + reason;
  const q = window[`_quiz_${idx}`];
  if (answer === correct) q.score++;
  q.answered++;
  if (q.answered === 3) {
    const result = document.getElementById(`qresult-${idx}`);
    result.style.display = 'block';
    const pct = Math.round(q.score / 3 * 100);
    result.textContent = `結果：${q.score}/3問正解（${pct}%） — ${pct===100?'完璧！👏':pct>=66?'よく理解できています':'もう一度確認してみましょう'}`;
  }
}

async function showApproval() {
  document.getElementById('panel-approval').style.display = 'block';
  document.getElementById('panel-approval').scrollIntoView({behavior:'smooth'});

  const summary = document.getElementById('approval-summary');
  summary.innerHTML = `
    <div class="summary-row"><span class="summary-label">顧客企業</span><span class="summary-value">${caseData.company}</span></div>
    <div class="summary-row"><span class="summary-label">処理部署数</span><span class="summary-value">${routeList.length}部署</span></div>
    <div class="summary-row"><span class="summary-label">処理ルート</span><span class="summary-value" style="font-size:12px">${routeList.join(' → ')}</span></div>
    <div class="summary-row"><span class="summary-label">社外委託</span><span class="summary-value">${routeList.includes('提携会社') ? '✅ あり' : 'なし'}</span></div>
    <div class="summary-row"><span class="summary-label">処理完了日時</span><span class="summary-value">${new Date().toLocaleDateString('ja-JP')} ${new Date().toLocaleTimeString('ja-JP')}</span></div>`;

  addAudit('PMO', `全部署処理完了：${routeList.length}部署 / ${Object.keys(deptResults).length}件の処理結果`);
}

function finalApprove(choice) {
  if (choice === 'go') {
    addAudit('社長', `最終承認：案件「${caseData.company}」を承認`);
    alert('✅ 承認が完了しました！\n\n監査ログに記録されました。\n次フェーズへの移行を進めてください。');
  } else {
    addAudit('社長', `差し戻し：修正・再検討を指示`);
    alert('🔄 差し戻しました。\n\n各部署の「修正する」ボタンから内容を修正してください。');
  }
}

function exportText() {
  const now = new Date();
  let content = `■ AI案件ルーティング記録\n作成日時：${now.toLocaleDateString('ja-JP')} ${now.toLocaleTimeString('ja-JP')}\n\n`;
  content += `【案件情報】\n企業名：${caseData.company}\n業種：${caseData.industry||'不明'}\n内容：${caseData.content}\n予算：${caseData.budget||'未定'}\n納期：${caseData.deadline||'未定'}\n\n`;
  content += `【処理ルート】\n${routeList.join(' → ')}\n\n`;
  Object.entries(deptResults).forEach(([dept, result]) => {
    content += `【${dept}】\n${result}\n\n`;
  });
  download(`案件記録_${caseData.company}_${now.toLocaleDateString('ja-JP').replace(/\//g,'-')}.txt`, content);
}

  const now = new Date();
  const company = caseData.company;
  let content = `━━━━━━━━━━━━━━━━━━━━━━━\n議　事　録\n━━━━━━━━━━━━━━━━━━━━━━━\n作成日時：${now.toLocaleDateString('ja-JP')} ${now.toLocaleTimeString('ja-JP')}\n案件名：${company} 様 案件処理\n処理部署：${routeList.join('→')}\n━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  content += `【1. 案件概要】\n企業名：${company}\n業種：${caseData.industry||'不明'}\n内容：${caseData.content}\n予算：${caseData.budget||'未定'} / 納期：${caseData.deadline||'未定'}\n\n`;
  content += `━━━━━━━━━━━━━━━━━━━━━━━\n【2. 各部署処理結果】\n━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  download(`議事録_${company}_${now.toLocaleDateString('ja-JP').replace(/\//g,'-')}.txt`, content);
}

function openLangExport() {
  const langs = ['🇺🇸 英語','🇨🇳 中国語','🇰🇷 韓国語','🇪🇸 スペイン語','🇻🇳 ベトナム語','🇹🇭 タイ語','🇮🇩 インドネシア語','🇧🇷 ポルトガル語','🇵🇭 タガログ語','🇩🇪 ドイツ語','🇫🇷 フランス語','🇮🇳 ヒンディー語'];
  const langNames = ['English','中文','한국어','Español','Tiếng Việt','ภาษาไทย','Bahasa Indonesia','Português','Filipino','Deutsch','Français','हिन्दी'];
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `<div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,0.15)">
    <h3 style="font-size:17px;font-weight:700;margin-bottom:16px">🌏 多言語で出力</h3>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      ${langs.map((l,i) => `<button onclick="this.classList.toggle('selected');window._selLang='${langNames[i]}';window._selLangLabel='${l}'" style="padding:8px;border:1px solid #dde3ed;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;transition:all 0.2s" class="">${l}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="runLangExport(this.closest('[style]'))" style="flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer">翻訳して出力</button>
      <button onclick="this.closest('[style*=fixed]').remove()" style="padding:12px 20px;background:transparent;border:1px solid #dde3ed;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer">キャンセル</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function runLangExport(overlay) {
  const lang = window._selLang;
  if (!lang) { alert('言語を選択してください'); return; }
  const content = `Case: ${caseData.company}\n${Object.entries(deptResults).map(([d,r]) => `[${d}]\n${r}`).join('\n\n')}`;
  overlay.innerHTML = '<div style="text-align:center;padding:40px;color:#8896a8;font-size:14px">⏳ 翻訳中...</div>';
  try {
    const res = await fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:`Translate the following Japanese business document to ${lang}. Keep structure intact. Professional business language only.`,userMessage:content})});
    const data = await res.json();
    overlay.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.15)">
      <div style="font-size:15px;font-weight:700;margin-bottom:12px">🌏 ${window._selLangLabel} 翻訳完了</div>
      <div style="background:#f5f8fc;border-radius:8px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-bottom:14px">${data.text}</div>
      <div style="display:flex;gap:8px">
        <button onclick="navigator.clipboard.writeText('${data.text.replace(/'/g,"\\'")}').then(()=>alert('コピーしました'))" style="flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer">📋 コピー</button>
        <button onclick="this.closest('[style*=fixed]').remove()" style="padding:10px 20px;background:transparent;border:1px solid #dde3ed;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer">閉じる</button>
      </div>
    </div>`;
    addAudit('多言語', `${window._selLangLabel}に翻訳出力`);
  } catch(e) { overlay.innerHTML = `<div style="padding:40px;color:#ef4444">[エラー] ${e.message}</div>`; }
}

function download(filename, content) {
  const blob = new Blob([content], {type:'text/plain;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  document.getElementById('panel-routing').style.display = 'none';
  document.getElementById('panel-processing').style.display = 'none';
  document.getElementById('panel-approval').style.display = 'none';
  document.getElementById('dept-cards-area').innerHTML = '';
  document.getElementById('analyze-btn').disabled = false;
  routeList = []; deptResults = {}; currentDeptIdx = 0;
  addAudit('システム', 'リセット：新しい案件を開始');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
renderAuditLog();
</script>
