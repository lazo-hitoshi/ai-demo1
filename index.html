<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1人社長 × AI執行部 — 案件フローデモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2430;
    --accent: #4af0b0;
    --text: #e8eaf0;
    --text-muted: #5a6070;
    --text-dim: #8892a0;
    --glow: rgba(74, 240, 176, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .header { text-align: center; margin-bottom: 48px; }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(74, 240, 176, 0.08);
    border: 1px solid rgba(74, 240, 176, 0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .header-sub {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
  }

  .flow-bar {
    display: flex;
    align-items: center;
    margin-bottom: 36px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .flow-step {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }

  .flow-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px;
    left: calc(50% + 14px);
    right: calc(-50% + 14px);
    height: 1px;
    background: var(--border);
    transition: background 0.4s;
  }

  .flow-step.done:not(:last-child)::after,
  .flow-step.active:not(:last-child)::after {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .flow-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    transition: all 0.4s;
    position: relative;
    z-index: 1;
  }

  .flow-step.active .flow-dot {
    border-color: var(--accent);
    background: rgba(74, 240, 176, 0.1);
    color: var(--accent);
    animation: dotPulse 1.5s ease-in-out infinite;
  }

  .flow-step.done .flow-dot {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 8px var(--glow); }
    50% { box-shadow: 0 0 20px rgba(74, 240, 176, 0.4); }
  }

  .flow-label {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    transition: color 0.3s;
  }

  .flow-step.active .flow-label,
  .flow-step.done .flow-label { color: var(--accent); }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .panel.active-panel::before { opacity: 1; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .panel-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(74, 240, 176, 0.1);
    border: 1px solid rgba(74, 240, 176, 0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .panel-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .panel-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .span-2 { grid-column: span 2; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 10px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus {
    border-color: rgba(74, 240, 176, 0.5);
    box-shadow: 0 0 0 3px rgba(74, 240, 176, 0.07);
  }

  textarea { min-height: 80px; }
  select option { background: var(--surface2); }

  .btn-run {
    width: 100%;
    padding: 14px 24px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-run:hover:not(:disabled) {
    background: #6fffc4;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(74, 240, 176, 0.25);
  }

  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-reset {
    width: 100%;
    padding: 10px 24px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }

  .btn-reset:hover { border-color: var(--text-muted); color: var(--text); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .result-card.visible { opacity: 1; transform: translateY(0); }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .result-header-left { display: flex; align-items: center; gap: 10px; }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .ai-badge.sales { color: #4af0b0; }
  .ai-badge.proposal { color: #2d9cdb; }
  .ai-badge.finance { color: #f5a623; }
  .ai-badge.quality { color: #c084fc; }
  .ai-badge.ceo { color: #ff6b9d; }

  .status-chip {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .status-chip.processing {
    background: rgba(74, 240, 176, 0.1);
    color: var(--accent);
    border: 1px solid rgba(74, 240, 176, 0.3);
  }

  .status-chip.done {
    background: rgba(74, 240, 176, 0.15);
    color: var(--accent);
    border: 1px solid rgba(74, 240, 176, 0.4);
  }

  .result-body {
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    min-height: 60px;
  }

  .typing::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
    color: var(--accent);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .processing-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .processing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotBounce 1.2s ease-in-out infinite;
  }

  .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .processing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .ceo-panel {
    background: linear-gradient(135deg, rgba(255, 107, 157, 0.06), rgba(74, 240, 176, 0.04));
    border: 1px solid rgba(255, 107, 157, 0.25);
    border-radius: 12px;
    padding: 24px;
    margin-top: 8px;
  }

  .ceo-panel h3 {
    color: #ff6b9d;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .approve-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .btn-approve {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-approve.go { background: var(--accent); color: var(--bg); }
  .btn-approve.go:hover { background: #6fffc4; box-shadow: 0 4px 16px rgba(74, 240, 176, 0.3); }
  .btn-approve.back { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-approve.back:hover { border-color: var(--text-muted); color: var(--text); }

  .final-result {
    background: linear-gradient(135deg, rgba(74, 240, 176, 0.05), rgba(45, 156, 219, 0.05));
    border: 1px solid rgba(74, 240, 176, 0.3);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    opacity: 0;
    transform: scale(0.97);
    transition: all 0.5s;
  }

  .final-result.visible { opacity: 1; transform: scale(1); }
  .final-result h2 { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .final-result p { color: var(--text-dim); font-size: 13px; line-height: 1.6; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .span-2 { grid-column: span 1; }
    .approve-btns { grid-template-columns: 1fr; }
    .flow-label { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-badge">AI EXECUTIVE DEMO</div>
    <h1>1人社長 × <span>AI執行部</span><br>案件フロー実演</h1>
    <p class="header-sub">案件情報を入力すると、AIが営業・提案・財務・品質を分担して<br>社長の意思決定材料を自動で揃えます</p>
  </div>

  <div class="flow-bar">
    <div class="flow-step" id="step-0"><div class="flow-dot">入力</div><div class="flow-label">案件入力</div></div>
    <div class="flow-step" id="step-1"><div class="flow-dot">営</div><div class="flow-label">営業AI</div></div>
    <div class="flow-step" id="step-2"><div class="flow-dot">提</div><div class="flow-label">提案AI</div></div>
    <div class="flow-step" id="step-3"><div class="flow-dot">財</div><div class="flow-label">財務AI</div></div>
    <div class="flow-step" id="step-4"><div class="flow-dot">品</div><div class="flow-label">品質AI</div></div>
    <div class="flow-step" id="step-5"><div class="flow-dot">社</div><div class="flow-label">社長承認</div></div>
  </div>

  <div class="panel active-panel" id="input-panel">
    <div class="panel-header">
      <div class="panel-icon">📋</div>
      <div>
        <div class="panel-title">案件情報入力</div>
        <div class="panel-subtitle">相談案件の概要を入力してください</div>
      </div>
    </div>
    <div class="form-grid">
      <div>
        <label>顧客企業名</label>
        <input type="text" id="company" placeholder="例：株式会社ABCテクノロジー" />
      </div>
      <div>
        <label>業種</label>
        <select id="industry">
          <option value="">選択してください</option>
          <option>製造業</option>
          <option>IT・ソフトウェア</option>
          <option>小売・EC</option>
          <option>物流・倉庫</option>
          <option>医療・ヘルスケア</option>
          <option>建設・不動産</option>
          <option>金融・保険</option>
          <option>エネルギー・インフラ</option>
          <option>その他</option>
        </select>
      </div>
      <div class="span-2">
        <label>相談・課題内容</label>
        <textarea id="issue" placeholder="例：営業担当が属人化しており、担当者交代時に顧客情報が引き継げていない。AI活用で営業プロセスを標準化したい。予算は年間300〜500万円程度。"></textarea>
      </div>
      <div>
        <label>想定予算感</label>
        <select id="budget">
          <option value="">未定</option>
          <option>〜100万円</option>
          <option>100〜300万円</option>
          <option>300〜500万円</option>
          <option>500万〜1000万円</option>
          <option>1000万円以上</option>
        </select>
      </div>
      <div>
        <label>納期感</label>
        <select id="timeline">
          <option value="">未定</option>
          <option>1ヶ月以内</option>
          <option>3ヶ月以内</option>
          <option>6ヶ月以内</option>
          <option>1年以内</option>
          <option>1年以上</option>
        </select>
      </div>
    </div>
    <button class="btn-run" id="start-btn" onclick="startFlow()">
      <span>▶</span> AI執行部を起動する
    </button>
  </div>

  <div id="results-area"></div>

</div>

<script>
  let isRunning = false;

  function setStep(n, state) {
    const el = document.getElementById(`step-${n}`);
    if (!el) return;
    el.className = `flow-step ${state}`;
    if (state === 'done') el.querySelector('.flow-dot').textContent = '✓';
  }

  function addCard(id, icon, label, badgeClass, loadingMsg) {
    const area = document.getElementById('results-area');
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = id;
    card.innerHTML = `
      <div class="result-header">
        <div class="result-header-left">
          <span style="font-size:18px">${icon}</span>
          <span class="ai-badge ${badgeClass}">${label}</span>
        </div>
        <span class="status-chip processing" id="${id}-status">処理中</span>
      </div>
      <div class="result-body" id="${id}-body">
        <div class="processing-dots">
          <span></span><span></span><span></span>
          <span style="margin-left:8px;font-family:'Noto Sans JP';font-size:13px;color:var(--text-muted)">${loadingMsg}</span>
        </div>
      </div>`;
    area.appendChild(card);
    setTimeout(() => card.classList.add('visible'), 50);
  }

  function setCardResult(id, text) {
    const body = document.getElementById(`${id}-body`);
    const status = document.getElementById(`${id}-status`);
    body.innerHTML = '';
    body.classList.add('typing');
    status.textContent = '完了';
    status.className = 'status-chip done';
    let i = 0;
    function typeChar() {
      if (i < text.length) { body.textContent += text[i++]; setTimeout(typeChar, 8); }
      else body.classList.remove('typing');
    }
    typeChar();
  }

  async function callAI(systemPrompt, userMessage) {
    const res = await fetch('https://ai-demo1-eta.vercel.app/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ systemPrompt, userMessage })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.text;
  }

  async function startFlow() {
    if (isRunning) return;
    const company = document.getElementById('company').value.trim();
    const industry = document.getElementById('industry').value;
    const issue = document.getElementById('issue').value.trim();
    const budget = document.getElementById('budget').value;
    const timeline = document.getElementById('timeline').value;

    if (!company || !issue) { alert('顧客企業名と相談内容を入力してください'); return; }

    isRunning = true;
    document.getElementById('start-btn').disabled = true;
    document.getElementById('results-area').innerHTML = '';

    const caseInfo = `企業名：${company}\n業種：${industry||'不明'}\n相談内容：${issue}\n予算感：${budget||'未定'}\n納期：${timeline||'未定'}`;

    setStep(0, 'done'); setStep(1, 'active');
    addCard('sales-card', '📊', '営業AI', 'sales', '顧客課題を分析中...');

    let salesResult = '';
    try {
      salesResult = await callAI(
        `あなたは法人営業の専門家AIです。案件情報を受け取り、以下を簡潔に整理してください。出力は日本語、箇条書きで簡潔に。\n\n【出力フォーマット】\n■ 顧客の課題仮説（2〜3点）\n■ 提案の切り口（2案）\n■ 初回面談で確認すべき質問（3つ）\n■ 初回接触メール 件名と本文（100字以内）\n\n余分な説明は不要。フォーマット通りに出力。`,
        `案件情報：\n${caseInfo}`
      );
    } catch(e) { salesResult = `[エラー] ${e.message}`; }

    setCardResult('sales-card', salesResult);
    setStep(1, 'done'); await sleep(600); setStep(2, 'active');
    addCard('proposal-card', '📝', '提案AI', 'proposal', '提案骨子を構築中...');

    let proposalResult = '';
    try {
      proposalResult = await callAI(
        `あなたはITコンサルタントの提案設計AIです。案件情報と営業分析をもとに、提案書の骨子を作成してください。\n\n【出力フォーマット】\n■ 提案タイトル\n■ 解決アプローチ（3ステップ）\n■ 提供価値（具体的に）\n■ 必要なリソース（概要）\n■ リスクと前提条件\n\n日本語、簡潔に。余分な説明不要。`,
        `案件情報：\n${caseInfo}\n\n営業AI分析：\n${salesResult}`
      );
    } catch(e) { proposalResult = `[エラー] ${e.message}`; }

    setCardResult('proposal-card', proposalResult);
    setStep(2, 'done'); await sleep(600); setStep(3, 'active');
    addCard('finance-card', '💹', '財務AI', 'finance', '採算シミュレーション中...');

    let financeResult = '';
    try {
      financeResult = await callAI(
        `あなたは財務分析AIです。案件情報と提案内容をもとに、採算シミュレーションを行ってください。\n\n【出力フォーマット】\n■ 想定売上レンジ（楽観・中立・保守）\n■ 粗利率の目安\n■ キャッシュ回収時期の目安\n■ 注意すべきコスト項目\n■ GO/NO-GOの判断軸（3点）\n\n数字は概算でよい。日本語、簡潔に。`,
        `案件情報：\n${caseInfo}\n\n提案内容：\n${proposalResult}`
      );
    } catch(e) { financeResult = `[エラー] ${e.message}`; }

    setCardResult('finance-card', financeResult);
    setStep(3, 'done'); await sleep(600); setStep(4, 'active');
    addCard('quality-card', '🔍', '品質AI', 'quality', '矛盾・漏れを検査中...');

    let qualityResult = '';
    try {
      qualityResult = await callAI(
        `あなたは品質監査AIです。提案内容と財務試算を精査し、問題点・リスクを洗い出してください。\n\n【出力フォーマット】\n■ 前提の確認不足（要注意点）\n■ 数値・条件の矛盾や過信リスク\n■ 顧客に誤解を与えやすい表現\n■ 社長確認が必要な判断事項\n■ 総合評価（A/B/C）と根拠\n\n厳しく、具体的に。余分な説明不要。`,
        `提案内容：\n${proposalResult}\n\n財務試算：\n${financeResult}`
      );
    } catch(e) { qualityResult = `[エラー] ${e.message}`; }

    setCardResult('quality-card', qualityResult);
    setStep(4, 'done'); await sleep(600); setStep(5, 'active');

    addCard('ceo-card', '👤', '司令塔 — 社長承認', 'ceo', 'サマリー生成中...');

    let ceoResult = '';
    try {
      ceoResult = await callAI(
        `あなたは1人社長の参謀AIです。各AIの分析結果をもとに、社長が30秒で意思決定できるブリーフィングを作成してください。\n\n【出力フォーマット】\n━━━ 社長向けブリーフィング ━━━\n■ 案件一行サマリー\n■ この案件を受けるべき理由（2点）\n■ 受けない場合のリスク\n■ 今すぐ確認すべきこと（1点）\n■ 推奨アクション\n\n1分で読める量で。判断しやすく。`,
        `案件：${caseInfo}\n\n営業分析：${salesResult}\n\n提案：${proposalResult}\n\n財務：${financeResult}\n\n品質：${qualityResult}`
      );
    } catch(e) { ceoResult = `[エラー] ${e.message}`; }

    const ceoBody = document.getElementById('ceo-card-body');
    const ceoStatus = document.getElementById('ceo-card-status');
    ceoBody.innerHTML = `
      <div style="white-space:pre-wrap;line-height:1.8;font-size:14px">${ceoResult}</div>
      <div class="ceo-panel">
        <h3>⚡ 社長の意思決定</h3>
        <p style="font-size:13px;color:var(--text-dim);line-height:1.6">上記の内容を確認し、この案件への対応を決定してください。</p>
        <div class="approve-btns">
          <button class="btn-approve go" onclick="finalDecision('go')">✅ この案件を進める</button>
          <button class="btn-approve back" onclick="finalDecision('back')">🔄 条件を修正して再検討</button>
        </div>
      </div>`;
    ceoStatus.textContent = '判断待ち';
    isRunning = false;
  }

  function finalDecision(decision) {
    setStep(5, 'done');
    const area = document.getElementById('results-area');
    const final = document.createElement('div');
    final.className = 'final-result';
    if (decision === 'go') {
      final.innerHTML = `
        <div style="font-size:40px;margin-bottom:12px">🚀</div>
        <h2>案件承認 — 前進</h2>
        <p>社長承認が完了しました。<br>次のステップ：初回面談のアポ取り → 提案書精査 → 顧客提出</p>`;
    } else {
      final.innerHTML = `
        <div style="font-size:40px;margin-bottom:12px">🔄</div>
        <h2>条件修正 — 再検討</h2>
        <p>品質AIの指摘事項を確認し、前提条件を修正して再フローを回してください。</p>
        <button class="btn-reset" onclick="resetAll()" style="margin-top:16px;max-width:300px">新しい案件情報で再入力する</button>`;
    }
    area.appendChild(final);
    setTimeout(() => final.classList.add('visible'), 100);
  }

  function resetAll() {
    document.getElementById('results-area').innerHTML = '';
    document.getElementById('start-btn').disabled = false;
    isRunning = false;
    const labels = ['入力','営','提','財','品','社'];
    for (let i = 0; i <= 5; i++) {
      const el = document.getElementById(`step-${i}`);
      if (el) { el.className = 'flow-step'; el.querySelector('.flow-dot').textContent = labels[i]; }
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
